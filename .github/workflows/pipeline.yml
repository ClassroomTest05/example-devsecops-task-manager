name: DevSecOps CI/CD Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  
  security-scan:
    name: "Security Scanning"
    runs-on: ubuntu-latest
    steps:
	    # Download kode terbaru ke runner
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Diperlukan Gitleaks scan riwayat git

			# Setup Java 17 di runner
      - name: Setup Java 17
	      uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # SAST: Cari bug di kode Java (SQL Injection, XSS, dll)
      - name: "SAST - Semgrep"
        uses: semgrep/semgrep-action@v1
        with: 
          config: p/java # Ruleset khusus untuk Java

      # SCA: Scan pom.xml - TRIVY, bukan OWASP!
      # Tidak kena rate limit 429, selesai 30-60 detik
      - name: "SCA - Trivy Filesystem Scan"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: "table"
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
			
			- name: "SCA - Generate Report"
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "template"
          template: "contrib/html.tpl"
          output: "trivy-fs-report.html"

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: trivy-fs-report.html
			
      # Secret Scan: Cari password/API key yang ter-commit
       - name: "Secret Scan - Gitleaks"
         run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /tmp
          /tmp/gitleaks detect \
            --source . \
            --redact \
            -v \
            --exit-code=2 \
            --log-opts="HEAD" \
            --report-format=sarif \
            --report-path=gitleaks-results.sarif

  # ═══════════════════════════════════════════════════════
  # JOB 2 — BUILD & TEST
  # Build dan jalankan unit test (butuh JOB 1 lolos dulu)
  # ═══════════════════════════════════════════════════════
	build-and-test:
    name: "Build & Unit Test"
    runs-on: ubuntu-latest
    needs: security-scan    # HANYA jalan jika Job 1 berhasil
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
	      uses: actions/setup-java@v4
        with: 
          java-version: '17' 
          distribution: 'temurin' 
          cache: maven 
      
      # Test pakai H2 in-memory — tidak perlu MySQL di pipeline
      - name: "Build & Unit Test"
        run: mvn clean verify -Dspring.profiles.active=test